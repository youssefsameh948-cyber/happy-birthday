<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise 🎂</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff4e7a;
        }

        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center;
            min-height: 100vh; font-family: 'Cairo', sans-serif; overflow: hidden;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%; animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 30px;
            padding: 60px 20px;
            width: 90%; max-width: 450px;
            text-align: center; box-shadow: 0 25px 45px rgba(0,0,0,0.2);
            position: relative; min-height: 400px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        #runawayBtn {
            background: white; color: var(--primary); border: none;
            padding: 15px 30px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #joke-msg {
            margin-top: 20px; color: white; font-weight: bold;
            font-size: 1.1rem; text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .candle-container {
            cursor: pointer; position: relative; display: inline-block;
            transition: transform 0.3s;
        }
        .candle-container:hover { transform: scale(1.1); }

        .flame {
            width: 15px; height: 25px; background: #ffcc00; border-radius: 50% 50% 20% 20%;
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            box-shadow: 0 0 20px #ffcc00; animation: flicker 0.1s ease-in infinite;
        }
        @keyframes flicker { 50% { transform: translateX(-50%) scale(1.1) rotate(3deg); } }
        .off .flame { display: none; }

        h1 {
            font-family: 'Pacifico', cursive; font-size: 2.5rem;
            color: white; margin: 15px 0; text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
            display: none; /* هيظهر بعد طفي الشمعة */
        }

        .final-msg {
            color: white; font-size: 1.2rem; line-height: 1.7;
            display: none; /* هيظهر بعد طفي الشمعة */
        }

        #blow-instruction {
            color: #fff; font-weight: bold; margin-bottom: 10px;
            font-size: 1.3rem; animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .heart {
            position: absolute; color: rgba(255,255,255,0.4);
            pointer-events: none; animation: floatUp 6s linear forwards;
        }
        @keyframes floatUp { to { transform: translateY(-110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="رابط_الأغنية_هنا.mp3" type="audio/mpeg">
    </audio>

    <div class="glass-card">
        <div id="start-screen">
            <button id="runawayBtn" onclick="handleInteraction()">🎁 اضغطي هنا يا قمر 🎁</button>
            <div id="joke-msg"> دوسي بس! 😉</div>
        </div>
        <div id="cake-screen" style="display: none;">
            <div id="blow-instruction">اطفي الشمعة يا قمر 🕯️✨</div>
            <div class="candle-container" id="candle" onclick="blowCandle()">
                <div class="flame"></div>
                <div style="font-size: 100px;">🎂</div>
            </div>
            
            <h1 id="finalTitle">Happy Birthday!</h1>
            <div id="finalMsg" class="final-msg">
               😂 كل سنة وأنتِ طيبة يا رفقة بية  ! 💖<br>
              💖😂 كل سنه وانتي عيله جدعه✨
              
             😂😂😂 وان شالله السنة دي تتهدي وتبطلي شبحنا
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        let attempts = 0;
        const jokes = [
            "تؤتؤ.. حاولي تاني! 😂",
            " معلش استحملي الرخامة 😜",
            "خلاص بجد.. دي اخر مره ! 🙄"
        ];

        function handleInteraction() {
            const btn = document.getElementById('runawayBtn');
            const msgBox = document.getElementById('joke-msg');

            if (attempts < 3) {
                // تحريك الزرار داخل حدود الكارد فقط عشان ميجيش فوق الكلام
                const card = document.querySelector('.glass-card');
                const maxX = (card.clientWidth / 2) - btn.clientWidth;
                const maxY = (card.clientHeight / 2) - btn.clientHeight;

                const x = (Math.random() - 0.5) * maxX * 1.5;
                const y = (Math.random() - 0.5) * maxY * 1.5;

                btn.style.transform = `translate(${x}px, ${y}px)`;
                msgBox.innerText = jokes[attempts];
                attempts++;
            } else {
                showCake();
            }
        }

        function showCake() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('cake-screen').style.display = 'block';
            
            // تشغيل الموسيقى
            const music = document.getElementById('bgMusic');
            music.play().catch(() => console.log("الموسيقى محتاجة تفاعل"));
        }

        function blowCandle() {
            const candle = document.getElementById('candle');
            if (candle.classList.contains('off')) return; // عشان ميتكررش

            candle.classList.add('off');
            document.getElementById('blow-instruction').style.display = 'none';
            
            // إظهار الكلام النهائي
            const title = document.getElementById('finalTitle');
            const msg = document.getElementById('finalMsg');
            title.style.display = 'block';
            msg.style.display = 'block';

            // احتفال كبير
            launchConfetti();
            startHearts();
        }

        function launchConfetti() {
            var end = Date.now() + (4 * 1000);
            (function frame() {
                confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 } });
                confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 } });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }

        function startHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.className = 'heart';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '100vh';
                heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
                document.body.appendChild(heart);
                setTimeout(() => heart.remove(), 6000);
            }, 400);
        }
    </script>
</body>
</html>
